<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telco Customer Churn Prediction</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <div class="container">
      <div class="header">
        <h1>Customer Churn Prediction</h1>
        <p>
          Enter customer information below to estimate churn risk.
        </p>
      </div>

      <div class="content">
        <div class="form-card">
          <h2>Customer Information</h2>

          <form id="predictionForm">
            <div class="form-grid">
              <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender" name="gender" required>
                  <option value="">Select</option>
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                </select>
              </div>

              <div class="form-group">
                <label for="seniorCitizen">Senior Citizen</label>
                <select id="seniorCitizen" name="seniorCitizen" required>
                  <option value="">Select</option>
                  <option value="0">No</option>
                  <option value="1">Yes</option>
                </select>
              </div>

              <div class="form-group">
                <label for="partner">Partner</label>
                <select id="partner" name="partner" required>
                  <option value="">Select</option>
                  <option value="Yes">Yes</option>
                  <option value="No">No</option>
                </select>
              </div>

              <div class="form-group">
                <label for="dependents">Dependents</label>
                <select id="dependents" name="dependents" required>
                  <option value="">Select</option>
                  <option value="Yes">Yes</option>
                  <option value="No">No</option>
                </select>
              </div>

              <div class="form-group">
                <label for="tenure">Tenure</label>
                <input
                  type="number"
                  id="tenure"
                  name="tenure"
                  placeholder="e.g. 12"
                  min="0"
                  required
                />
              </div>

              <div class="form-group">
                <label for="monthlyCharges">Monthly Charges</label>
                <input
                  type="number"
                  step="0.01"
                  id="monthlyCharges"
                  name="monthlyCharges"
                  placeholder="e.g. 70.50"
                  required
                />
              </div>

              <div class="form-group">
                <label for="totalCharges">Total Charges</label>
                <input
                  type="number"
                  step="0.01"
                  id="totalCharges"
                  name="totalCharges"
                  placeholder="e.g. 850.25"
                  required
                />
              </div>

              <div class="form-group">
                <label for="phoneService">Phone Service</label>
                <select id="phoneService" name="phoneService" required>
                  <option value="">Select</option>
                  <option value="Yes">Yes</option>
                  <option value="No">No</option>
                </select>
              </div>

              <div class="form-group">
                <label for="internetService">Internet Service</label>
                <select id="internetService" name="internetService" required>
                  <option value="">Select</option>
                  <option value="DSL">DSL</option>
                  <option value="Fiber optic">Fiber optic</option>
                  <option value="No">No</option>
                </select>
              </div>

              <div class="form-group">
                <label for="contract">Contract</label>
                <select id="contract" name="contract" required>
                  <option value="">Select</option>
                  <option value="Month-to-month">Month-to-month</option>
                  <option value="One year">One year</option>
                  <option value="Two year">Two year</option>
                </select>
              </div>

              <div class="form-group">
                <label for="paymentMethod">Payment Method</label>
                <select id="paymentMethod" name="paymentMethod" required>
                  <option value="">Select</option>
                  <option value="Electronic check">Electronic check</option>
                  <option value="Mailed check">Mailed check</option>
                  <option value="Bank transfer (automatic)">Bank transfer (automatic)</option>
                  <option value="Credit card (automatic)">Credit card (automatic)</option>
                </select>
              </div>
            </div>

            <div class="button-area">
              <button type="submit" class="predict-btn" id="predictBtn">Predict</button>
            </div>
          </form>
        </div>

        <div class="result-card">
          <h2>Prediction Result</h2>
          <div id="resultBox" class="result-box empty">
            <p>No prediction yet.</p>
            <span>Submit the form to see the result here.</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
